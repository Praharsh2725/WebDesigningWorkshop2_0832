<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">MySite</a>
  </div>
</nav>

<div class="container mt-4">

  <!-- Card -->
  <div class="card" style="width: 18rem;">
    <img src="https://static.vecteezy.com/system/resources/thumbnails/012/562/470/small/abstract-background-modern-business-card-design-template-png.png" class="card-img-top">
    <div class="card-body">
      <h5 class="card-title">Sample Card</h5>
      <p class="card-text">This is a simple card.</p>
      <a href="#" class="btn btn-primary">Click Me</a>
    </div>
  </div>

  <!-- Progress Bar -->
  <div class="mt-4">
    <div class="progress">
      <div class="progress-bar" style="width: 60%;">60%</div>
    </div>
  </div>

</div>

</body>
</html>
